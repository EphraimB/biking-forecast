<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Definitions for Gradients -->
  <defs>
    <!-- Emerald Green to Cyber Teal gradient -->
    <linearGradient id="emeraldTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" /> <!-- emerald -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- cyan -->
    </linearGradient>
    
    <!-- Neon Indigo to Violet glow gradient -->
    <linearGradient id="indigoGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" /> <!-- primary -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- violet -->
    </linearGradient>
    
    <!-- Amber weather/sun gradient -->
    <linearGradient id="sunAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" /> <!-- amber -->
      <stop offset="100%" stop-color="#ef4444" /> <!-- red/ruby -->
    </linearGradient>

    <!-- Sleek Wind flow gradient -->
    <linearGradient id="windFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.1" />
    </linearGradient>

    <!-- Glassmorphic HUD background fill -->
    <radialGradient id="hudBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0b0f19" />
    </radialGradient>
  </defs>

  <!-- Circular Glassmorphic HUD Outer Plate -->
  <circle cx="256" cy="256" r="236" fill="url(#hudBg)" stroke="url(#indigoGlow)" stroke-width="12" stroke-opacity="0.8" />
  
  <!-- Outer Tech HUD Tick Rings -->
  <circle cx="256" cy="256" r="216" stroke="#1e293b" stroke-width="2" stroke-dasharray="8 12" />
  <circle cx="256" cy="256" r="248" stroke="#10b981" stroke-width="1" stroke-dasharray="40 180" stroke-opacity="0.5" />

  <!-- Weather Layer: Styled Glowing Sun / Radar Sweep in Top Right -->
  <g transform="translate(350, 150)">
    <!-- Glowing Sun Aura -->
    <circle cx="0" cy="0" r="38" fill="url(#sunAmber)" opacity="0.85" />
    <circle cx="0" cy="0" r="48" stroke="url(#sunAmber)" stroke-width="2" stroke-dasharray="6 6" opacity="0.6" />
    <!-- Radiant Solar/Radar Ticks -->
    <line x1="0" y1="-58" x2="0" y2="-68" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
    <line x1="41" y1="-41" x2="48" y2="-48" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
    <line x1="58" y1="0" x2="68" y2="0" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
    <line x1="41" y1="41" x2="48" y2="48" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Atmospheric Layer: Swooping Wind Vectors (planning awareness) -->
  <path d="M 60,180 C 140,160 220,200 300,160 C 340,140 380,110 420,110" stroke="url(#windFlow)" stroke-width="8" stroke-linecap="round" fill="none" />
  <path d="M 80,220 C 180,210 260,250 360,200 C 400,180 430,160 450,160" stroke="url(#windFlow)" stroke-width="6" stroke-linecap="round" fill="none" />
  <path d="M 50,140 C 120,130 180,150 250,130" stroke="url(#windFlow)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5" />

  <!-- Biking Layer: Stylized Tech-Bicycle Silhouette in Emerald Green & Cyan -->
  <g transform="translate(40, 80)">
    <!-- Rear Wheel -->
    <circle cx="120" cy="240" r="60" stroke="url(#emeraldTeal)" stroke-width="12" fill="none" />
    <circle cx="120" cy="240" r="40" stroke="#10b981" stroke-width="2" stroke-dasharray="6 6" fill="none" opacity="0.7" />
    <circle cx="120" cy="240" r="10" fill="#10b981" />

    <!-- Front Wheel -->
    <circle cx="280" cy="240" r="60" stroke="url(#emeraldTeal)" stroke-width="12" fill="none" />
    <circle cx="280" cy="240" r="40" stroke="#10b981" stroke-width="2" stroke-dasharray="6 6" fill="none" opacity="0.7" />
    <circle cx="280" cy="240" r="10" fill="#10b981" />

    <!-- Chainring / Pedals Center -->
    <circle cx="190" cy="240" r="22" stroke="url(#emeraldTeal)" stroke-width="6" fill="none" />
    <line x1="190" y1="220" x2="190" y2="260" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" />

    <!-- Frame Structure -->
    <!-- Rear Stay: Rear Hub to Seat Joint -->
    <line x1="120" y1="240" x2="175" y2="150" stroke="url(#emeraldTeal)" stroke-width="10" stroke-linecap="round" />
    <!-- Chain Stay: Rear Hub to Pedal Center -->
    <line x1="120" y1="240" x2="190" y2="240" stroke="url(#emeraldTeal)" stroke-width="10" stroke-linecap="round" />
    <!-- Seat Tube: Pedal Center to Seat Joint -->
    <line x1="190" y1="240" x2="175" y2="150" stroke="url(#emeraldTeal)" stroke-width="10" stroke-linecap="round" />
    <!-- Down Tube: Pedal Center to Headtube Joint -->
    <line x1="190" y1="240" x2="255" y2="140" stroke="url(#emeraldTeal)" stroke-width="10" stroke-linecap="round" />
    <!-- Top Tube: Seat Joint to Headtube Joint -->
    <line x1="175" y1="150" x2="255" y2="140" stroke="url(#emeraldTeal)" stroke-width="10" stroke-linecap="round" />
    <!-- Fork: Front Hub to Headtube Joint -->
    <line x1="280" y1="240" x2="260" y2="120" stroke="url(#emeraldTeal)" stroke-width="10" stroke-linecap="round" />
    
    <!-- Seat / Saddle -->
    <path d="M 150,150 L 195,150" stroke="#06b6d4" stroke-width="12" stroke-linecap="round" />
    
    <!-- Handlebars and Stem -->
    <path d="M 260,120 L 250,95 L 275,95" stroke="#06b6d4" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Foreground Atmospheric Indicator: Compass Arrow / Chevron in bottom left -->
  <path d="M 100,380 L 130,350 L 160,380" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8" />
  <path d="M 100,395 L 130,365 L 160,395" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5" />
</svg>
